# Render Blueprint — deploys the Forge API from backend/.
# Dashboard → New → Blueprint → select this repo. Values marked
# sync:false are prompted for on first deploy (copy from backend/.env;
# see SETUP.md for where each one comes from).
services:
  - type: web
    name: forge-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # The deployed frontend URL (no trailing slash) — drives CORS + email links.
      # Set this to your Vercel URL once it exists, e.g. https://gym-app.vercel.app
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      # Fresh secrets for production — no need to reuse local ones.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
